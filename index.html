<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Um Mar de Sentimentos 🌊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Lato:wght@300;400&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep-blue: #020813;
    --ocean-blue: #0a2540;
    --cyan: #00f2fe;
    --seafoam: #4facfe;
    --pale-blue: #e0f2fe;
    --white: #ffffff;
  }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: var(--deep-blue);
    color: var(--white);
    font-family: 'Lato', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #ocean-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .main-container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 20px;
    max-width: 500px;
  }

  .message-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(28px, 6vw, 42px);
    color: var(--cyan);
    margin-bottom: 12px;
    opacity: 0.95;
    filter: drop-shadow(0 0 12px rgba(0, 242, 254, 0.4));
  }

  .message-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(16px, 3.8vw, 24px);
    font-style: italic;
    color: rgba(224, 242, 254, 0.8);
    margin-bottom: 40px;
    line-height: 1.5;
  }

  /* ─── BUQUÊ DAS PROFUNDEZAS DO MAR ─── */
  .bouquet-wrapper {
    display: inline-block;
    position: relative;
    width: min(300px, 75vw);
    height: min(300px, 75vw);
    background: radial-gradient(circle, rgba(0, 242, 254, 0.4) 0%, rgba(2, 8, 19, 0) 70%);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s;
    user-select: none;
  }

  .bouquet-wrapper::before {
    content: "💐";
    font-size: clamp(120px, 26vw, 150px);
    line-height: min(300px, 75vw);
    display: block;
    position: relative;
    z-index: 5;
    filter: drop-shadow(0 0 25px rgba(0, 242, 254, 0.6));
    animation: floatSea 3.5s ease-in-out infinite alternate;
  }

  .bouquet-wrapper:hover {
    transform: scale(1.12) rotate(-3deg);
    background: radial-gradient(circle, rgba(79, 172, 254, 0.6) 0%, rgba(2, 8, 19, 0) 70%);
    filter: drop-shadow(0 0 50px rgba(0, 242, 254, 0.9));
  }

  .click-caption {
    font-size: 11px;
    color: var(--cyan);
    opacity: 0.6;
    margin-top: 35px;
    font-family: 'Lato', sans-serif;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: pulseText 2s infinite;
  }

  .fx-ocean-item {
    position: fixed;
    z-index: 99999;
    pointer-events: none;
    user-select: none;
    will-change: transform, opacity;
  }

  @keyframes floatSea {
    0% { transform: translateY(5px) rotate(-1deg); }
    100% { transform: translateY(-15px) rotate(3deg); }
  }

  @keyframes pulseText {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }
</style>
</head>
<body>

<canvas id="ocean-canvas"></canvas>

<div class="main-container">
  <h1 class="message-title">Para Ling Ling 🌊</h1>
  <p class="message-subtitle">Porque o meu sentimento por você é tão profundo quanto o oceano.</p>
  
  <div class="bouquet-wrapper" onclick="triggerOceanMagic(event)"></div>
  
  <p class="click-caption">💙 Clique no buquê 💙</p>
</div>

<script>
// ─── CANVAS OCEAN (BOLHAS E LUZ SUBMARINA) ───
const canvas = document.getElementById('ocean-canvas');
const ctx = canvas.getContext('2d');
let W, H, bubbles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildBubbles();
}

function buildBubbles() {
  bubbles = [];
  for (let i = 0; i < 60; i++) {
    bubbles.push({
      x: Math.random() * W,
      y: Math.random() * H + H, // Começam abaixo ou espalhadas
      r: Math.random() * 3 + 1,
      speed: Math.random() * 1.5 + 0.5,
      wobble: Math.random() * 2,
      wobbleSpeed: Math.random() * 0.02
    });
  }
}

function drawOcean(t) {
  // Gradiente do fundo do mar (Escuro embaixo, levemente mais claro no topo)
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#041428');
  g.addColorStop(0.6, '#020b18');
  g.addColorStop(1, '#01050d');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Desenhar e mover as bolhas subindo
  bubbles.forEach(b => {
    b.y -= b.speed;
    b.x += Math.sin(t * b.wobbleSpeed) * 0.3;

    // Se a bolha sumir no topo, reseta para o fundo
    if (b.y < -10) {
      b.y = H + 10;
      b.x = Math.random() * W;
    }

    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(135, 206, 250, 0.3)';
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.lineWidth = 0.5;
    ctx.fill();
    ctx.stroke();
  });
}

function loop(t) {
  drawOcean(t * 0.05);
  requestAnimationFrame(loop);
}
window.addEventListener('resize', resize);
resize();
requestAnimationFrame(loop);

// ─── EXPLOSÃO DE CONCHAS E PÉROLAS (FLUTUANDO PARA CIMA) ───
function triggerOceanMagic(event) {
  const marItems = ['🐚', '⭐', '🦪', '🌊', '💙', '🫧', '💎', '🌸'];
  const quantidade = 50;

  const bq = event.currentTarget;
  bq.style.transform = 'scale(0.92) rotate(4deg)';
  setTimeout(() => { bq.style.transform = ''; }, 250);

  for (let i = 0; i < quantidade; i++) {
    setTimeout(() => {
      const item = document.createElement('div');
      item.className = 'fx-ocean-item';
      item.innerText = marItems[Math.floor(Math.random() * marItems.length)];
      
      const startX = Math.random() * 100;
      item.style.left = startX + 'vw';
      item.style.bottom = '-50px'; // Elas brotam do fundo e sobem!
      
      const tamanho = Math.random() * 18 + 24; // Tamanho ideal (24px a 42px)
      item.style.fontSize = tamanho + 'px';
      item.style.opacity = Math.random() * 0.4 + 0.6;
      item.style.filter = `drop-shadow(0 0 ${Math.random() * 8 + 4}px rgba(0, 242, 254, 0.7))`;
      
      const duracao = Math.random() * 2 + 3; // Ritmo de subida flutuante
      item.style.transition = `transform ${duracao}s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity ${duracao}s ease-in`;
      
      document.body.appendChild(item);
      
      setTimeout(() => {
        const endX = startX + (Math.random() * 20 - 10);
        const rodar = Math.random() * 360 - 180;
        // Sobe cruzando a tela em direção ao topo
        item.style.transform = `translate(${endX - startX}vw, -110vh) rotate(${rodar}deg)`;
        item.style.opacity = '0';
      }, 50);
      
      setTimeout(() => { item.remove(); }, duracao * 1000 + 100);
    }, i * 45);
  }
}
</script>
</body>
</html>
