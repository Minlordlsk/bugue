<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Um Presente para Você 💜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Lato:wght@300;400&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #07000f;
    --deep: #0e0018;
    --purple: #7b2fff;
    --lilac: #c084fc;
    --pale: #e9d5ff;
    --white: #f8f0ff;
  }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: var(--black);
    color: var(--white);
    font-family: 'Lato', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #sky-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .main-container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 20px;
    max-width: 500px;
  }

  .message-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(28px, 6vw, 42px);
    color: var(--lilac);
    margin-bottom: 12px;
    opacity: 0.95;
    filter: drop-shadow(0 0 10px rgba(192, 132, 252, 0.3));
  }

  .message-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(16px, 3.8vw, 24px);
    font-style: italic;
    color: rgba(233, 213, 255, 0.75);
    margin-bottom: 40px;
    line-height: 1.5;
  }

  /* ─── BUQUÊ LUXUOSO E GIGANTE DA IMAGEM ─── */
  .bouquet-wrapper {
    display: inline-block;
    position: relative;
    width: min(300px, 75vw);
    height: min(300px, 75vw);
    background: radial-gradient(circle, rgba(168, 85, 247, 0.5) 0%, rgba(7, 0, 15, 0) 70%);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s;
    user-select: none;
  }

  .bouquet-wrapper::before {
    content: "💐";
    font-size: clamp(120px, 26vw, 150px);
    line-height: min(300px, 75vw);
    display: block;
    position: relative;
    z-index: 5;
    filter: drop-shadow(0 0 25px rgba(192, 132, 252, 0.7));
    animation: floatBouquet 4s ease-in-out infinite alternate;
  }

  .bouquet-wrapper:hover {
    transform: scale(1.12) rotate(3deg);
    background: radial-gradient(circle, rgba(168, 85, 247, 0.7) 0%, rgba(7, 0, 15, 0) 70%);
    filter: drop-shadow(0 0 50px rgba(192, 132, 252, 0.95));
  }

  .click-caption {
    font-size: 11px;
    color: var(--lilac);
    opacity: 0.6;
    margin-top: 35px;
    font-family: 'Lato', sans-serif;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: pulseText 2s infinite;
  }

  .fx-flower-petal {
    position: fixed;
    z-index: 99999;
    pointer-events: none;
    user-select: none;
    will-change: transform, opacity;
  }

  @keyframes floatBouquet {
    0% { transform: translateY(0px) rotate(0deg); }
    100% { transform: translateY(-15px) rotate(2deg); }
  }

  @keyframes pulseText {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }
</style>
</head>
<body>

<canvas id="sky-canvas"></canvas>

<div class="main-container">
  <h1 class="message-title">Para Ling Ling 💜</h1>
  <p class="message-subtitle">Porque algumas flores são tão especiais que merecem um lugar só delas.</p>
  
  <div class="bouquet-wrapper" onclick="triggerMagicChuva(event)"></div>
  
  <p class="click-caption">✨ Clique no buquê ✨</p>
</div>

<script>
// ─── CANVAS SKY (CÉU ESTRELADO) ───
const canvas = document.getElementById('sky-canvas');
const ctx = canvas.getContext('2d');
let W, H, stars = [], shootingStars = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildStars();
}

function buildStars() {
  stars = [];
  for (let i = 0; i < 150; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.2,
      alpha: Math.random(),
      speed: Math.random() * 0.004 + 0.002,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function drawSky(t) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#07000f');
  g.addColorStop(0.5, '#0e0018');
  g.addColorStop(1, '#130022');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  stars.forEach(s => {
    s.alpha = 0.3 + 0.5 * Math.abs(Math.sin(t * s.speed + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220,200,255,${s.alpha})`;
    ctx.fill();
  });

  if (Math.random() < 0.006) {
    shootingStars.push({ x: Math.random() * W * 0.7, y: Math.random() * H * 0.4, len: 80 + Math.random() * 60, alpha: 1 });
  }
  shootingStars = shootingStars.filter(s => s.alpha > 0);
  shootingStars.forEach(s => {
    const grd = ctx.createLinearGradient(s.x, s.y, s.x + s.len, s.y + s.len * 0.4);
    grd.addColorStop(0, `rgba(220,200,255,${s.alpha})`);
    grd.addColorStop(1, 'rgba(220,200,255,0)');
    ctx.strokeStyle = grd;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x + s.len, s.y + s.len * 0.4);
    ctx.stroke();
    s.x += 3; s.y += 1.5; s.alpha -= 0.025;
  });
}

function loop(t) {
  drawSky(t * 0.001);
  requestAnimationFrame(loop);
}
window.addEventListener('resize', resize);
resize();
requestAnimationFrame(loop);

// ─── CHUVA DE FLORES INTERATIVA GIGANTE ───
function triggerMagicChuva(event) {
  const flores = ['🌸', '💜', '✨', '🌹', '🌷', '💐', '🌺', '🦋', '🔮'];
  const quantidade = 55;

  const bq = event.currentTarget;
  bq.style.transform = 'scale(0.9) rotate(-4deg)';
  setTimeout(() => { bq.style.transform = ''; }, 250);

  for (let i = 0; i < quantidade; i++) {
    setTimeout(() => {
      const f = document.createElement('div');
      f.className = 'fx-flower-petal';
      f.innerText = flores[Math.floor(Math.random() * flores.length)];
      
      const startX = Math.random() * 100;
      f.style.left = startX + 'vw';
      f.style.top = '-50px';
      
      const tamanho = Math.random() * 20 + 26;
      f.style.fontSize = tamanho + 'px';
      f.style.opacity = Math.random() * 0.3 + 0.7;
      f.style.filter = `drop-shadow(0 0 ${Math.random() * 8 + 5}px rgba(192, 132, 252, 0.85))`;
      
      const duracao = Math.random() * 2 + 2.5;
      f.style.transition = `transform ${duracao}s linear, opacity ${duracao}s ease-out`;
      
      document.body.appendChild(f);
      
      setTimeout(() => {
        const endX = startX + (Math.random() * 24 - 12);
        const rodar = Math.random() * 720 - 360;
        f.style.transform = `translate(${endX - startX}vw, 105vh) rotate(${rodar}deg)`;
        f.style.opacity = '0';
      }, 50);
      
      setTimeout(() => { f.remove(); }, duracao * 1000 + 100);
    }, i * 40);
  }
}
</script>
</body>
</html>
